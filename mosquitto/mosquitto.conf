# Mosquitto broker configuration for AlarmIoT
# This file is mounted into the container at /mosquitto/config/mosquitto.conf

# Auth settings are per-listener so the two listeners below can differ.
per_listener_settings true

# ── External listener (IoT kits, MQTT clients) ────────────────────────────────
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Internal Docker listener (Node-RED only — NOT exposed outside Docker) ─────
# Node-RED connects using the Docker service name "mosquitto" on this port.
listener 1884
allow_anonymous true
