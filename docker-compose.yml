services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto:/mosquitto/config   # mosquitto.conf + passwd live here
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  nodered:
    image: nodered/node-red:4.1
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - FLOWS=flow.json          # matches ./nodered/flow.json
    volumes:
      - ./nodered:/data          # flows, package.json and installed modules live here
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:
