services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto:/mosquitto/config   # mosquitto.conf + passwd live here
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  nodered:
    image: nodered/node-red:4.1
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto
    # When configuring the MQTT broker inside Node-RED, use host "mosquitto"
    # (the service name above), not "localhost".

volumes:
  mosquitto_data:
  mosquitto_log:
  nodered_data:
